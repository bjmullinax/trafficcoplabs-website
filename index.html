<!-- ============================================================
     TRAFFIC COP LABS — MEGA NAVIGATION (Shadow DOM Isolated)
     
     This component is fully encapsulated in a Shadow DOM.
     No external CSS can interfere with it, and its styles
     won't leak into your WordPress theme.
     
     Just paste this entire block wherever you want the nav.
     ============================================================ -->

<tcl-navbar></tcl-navbar>

<script>
class TCLNavbar extends HTMLElement {
  connectedCallback() {
    const shadow = this.attachShadow({ mode: 'open' });

    shadow.innerHTML = `
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap');

        /* ============================================================
           RESET & VARIABLES — scoped to shadow root
           ============================================================ */
        *, *::before, *::after {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        :host {
          display: block;
          position: sticky;
          top: 0;
          z-index: 9999;
          font-family: 'Outfit', system-ui, -apple-system, sans-serif;
          font-size: 16px;
          line-height: 1.5;
          color: #1e293b;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; }
        img { display: block; }

        /* ---- VARIABLES ---- */
        :host {
          --tcl-navy:        #1a2d42;
          --tcl-blue:        #3a7ca5;
          --tcl-orange:      #e8921b;
          --tcl-orange-dark: #cf7e10;
          --tcl-logo-cream:  #F2F2F2;
          --tcl-logo-orange: #F5A623;
          --tcl-white:       #ffffff;
          --tcl-off-white:   #f7f8fa;
          --tcl-border:      #e5e7eb;
          --tcl-text:        #1e293b;
          --tcl-text-mid:    #64748b;
          --tcl-text-muted:  #94a3b8;
          --tcl-nav-h:       72px;
          --tcl-sidebar-w:   224px;
          --tcl-max-w:       1280px;
          --tcl-ease:        cubic-bezier(0.4, 0, 0.2, 1);
          --tcl-fast:        0.18s;
          --tcl-med:         0.25s;
          --tcl-slow:        0.35s;
        }

        /* ---- BRAND STRIPE ---- */
        .tcl-stripe {
          height: 2px;
          background: linear-gradient(90deg, var(--tcl-orange), var(--tcl-blue));
          opacity: 0.6;
        }

        /* ---- NAVBAR BAR ---- */
        .tcl-nav {
          background: rgba(15, 20, 30, 0.92);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          height: var(--tcl-nav-h);
          border-bottom: 1px solid rgba(255,255,255,0.08);
          position: relative;
          overflow: visible;
        }

        .tcl-nav__inner {
          max-width: var(--tcl-max-w);
          margin: 0 auto;
          padding: 0 28px;
          height: 100%;
          display: flex;
          align-items: center;
        }

        /* ---- TEXT LOGO ---- */
        .tcl-nav__logo {
          display: flex;
          align-items: baseline;
          text-decoration: none;
          flex-shrink: 0;
          margin-right: 44px;
          font-family: 'Bebas Neue', sans-serif;
          font-weight: 400;
          font-size: 30px;
          letter-spacing: 0.05em;
          line-height: 1;
          text-transform: uppercase;
          white-space: nowrap;
          -webkit-text-stroke: 0.5px currentColor;
          transition: opacity var(--tcl-fast) var(--tcl-ease);
        }

        .tcl-nav__logo:hover {
          opacity: 0.85;
        }

        .tcl-nav__logo-main {
          color: var(--tcl-logo-cream);
        }

        .tcl-nav__logo-accent {
          color: var(--tcl-logo-orange);
          margin-left: 0.18em;
        }

        /* Desktop menu items */
        .tcl-nav__menu {
          display: flex;
          align-items: center;
          gap: 4px;
        }

        .tcl-nav__item {
          display: flex;
          align-items: center;
          gap: 7px;
          padding: 10px 20px;
          font-size: 15px;
          font-weight: 600;
          color: rgba(255,255,255,0.85);
          cursor: pointer;
          border-radius: 8px;
          transition: color var(--tcl-fast) var(--tcl-ease),
                      background var(--tcl-fast) var(--tcl-ease);
          user-select: none;
          white-space: nowrap;
        }

        .tcl-nav__item:hover,
        .tcl-nav__item.is-active {
          color: var(--tcl-orange);
          background: rgba(232,146,27,0.1);
        }

        .tcl-nav__item-chevron {
          width: 11px;
          height: 11px;
          transition: transform var(--tcl-fast) var(--tcl-ease);
          flex-shrink: 0;
        }

        .tcl-nav__item.is-active .tcl-nav__item-chevron {
          transform: rotate(180deg);
        }

        /* Right actions */
        .tcl-nav__actions {
          margin-left: auto;
          display: flex;
          align-items: center;
          gap: 12px;
        }

        .tcl-nav__login {
          display: inline-flex;
          align-items: center;
          padding: 10px 24px;
          font-size: 13.5px;
          font-weight: 700;
          letter-spacing: 0.6px;
          color: rgba(255,255,255,0.9);
          background: transparent;
          border: 1.5px solid rgba(255,255,255,0.35);
          border-radius: 8px;
          text-decoration: none;
          cursor: pointer;
          transition: background var(--tcl-fast) var(--tcl-ease),
                      border-color var(--tcl-fast) var(--tcl-ease),
                      color var(--tcl-fast) var(--tcl-ease),
                      transform 0.12s ease;
          white-space: nowrap;
        }

        .tcl-nav__login:hover {
          background: rgba(255,255,255,0.08);
          border-color: var(--tcl-orange);
          color: var(--tcl-orange);
          transform: translateY(-1px);
        }

        /* Hamburger */
        .tcl-nav__burger {
          display: none;
          background: none;
          border: none;
          cursor: pointer;
          padding: 8px;
          margin-left: 16px;
          -webkit-tap-highlight-color: transparent;
        }

        .tcl-nav__burger-line {
          display: block;
          width: 24px;
          height: 2.5px;
          background: var(--tcl-white);
          border-radius: 2px;
          transition: transform var(--tcl-slow) var(--tcl-ease),
                      opacity var(--tcl-med) var(--tcl-ease);
        }

        .tcl-nav__burger-line + .tcl-nav__burger-line { margin-top: 5px; }

        .tcl-nav__burger.is-open .tcl-nav__burger-line:nth-child(1) {
          transform: translateY(7.5px) rotate(45deg);
        }
        .tcl-nav__burger.is-open .tcl-nav__burger-line:nth-child(2) {
          opacity: 0;
        }
        .tcl-nav__burger.is-open .tcl-nav__burger-line:nth-child(3) {
          transform: translateY(-7.5px) rotate(-45deg);
        }

        /* ---- MEGA DROPDOWN ---- */
        .tcl-mega {
          position: absolute;
          top: 100%;
          left: 0;
          right: 0;
          background: var(--tcl-white);
          box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
          opacity: 0;
          visibility: hidden;
          transform: translateY(-6px);
          transition: opacity var(--tcl-med) var(--tcl-ease),
                      transform var(--tcl-med) var(--tcl-ease),
                      visibility var(--tcl-med);
          pointer-events: none;
        }

        .tcl-mega.is-open {
          opacity: 1;
          visibility: visible;
          transform: translateY(0);
          pointer-events: auto;
        }

        .tcl-mega__inner {
          max-width: var(--tcl-max-w);
          margin: 0 auto;
          display: flex;
          min-height: 240px;
        }

        /* Sidebar */
        .tcl-mega__sidebar {
          width: var(--tcl-sidebar-w);
          flex-shrink: 0;
          background: var(--tcl-off-white);
          border-right: 1px solid var(--tcl-border);
          padding: 20px 0;
        }

        .tcl-mega__side-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 13px 28px;
          font-size: 15px;
          font-weight: 500;
          color: var(--tcl-text);
          cursor: pointer;
          border-left: 3px solid transparent;
          transition: all var(--tcl-fast) var(--tcl-ease);
        }

        .tcl-mega__side-item:hover {
          background: rgba(0,0,0,0.025);
        }

        .tcl-mega__side-item.is-active {
          background: var(--tcl-white);
          border-left-color: var(--tcl-orange);
          color: var(--tcl-orange);
          font-weight: 600;
        }

        .tcl-mega__side-chevron {
          width: 13px;
          height: 13px;
          opacity: 0.35;
          transition: opacity var(--tcl-fast) var(--tcl-ease),
                      transform var(--tcl-fast) var(--tcl-ease);
          flex-shrink: 0;
        }

        .tcl-mega__side-item.is-active .tcl-mega__side-chevron {
          opacity: 0.7;
          transform: translateX(2px);
        }

        /* Content area */
        .tcl-mega__content {
          flex: 1;
          padding: 32px 44px 36px;
        }

        .tcl-mega__section-label {
          font-size: 11.5px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1.4px;
          color: var(--tcl-text-muted);
          margin-bottom: 20px;
          padding-bottom: 14px;
          border-bottom: 1px solid var(--tcl-border);
        }

        .tcl-mega__grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 6px;
        }

        .tcl-mega__card {
          display: block;
          padding: 16px 20px;
          border-radius: 10px;
          text-decoration: none;
          transition: background var(--tcl-fast) var(--tcl-ease);
        }

        .tcl-mega__card:hover {
          background: var(--tcl-off-white);
        }

        .tcl-mega__card-title {
          font-size: 15px;
          font-weight: 600;
          color: var(--tcl-text);
          margin-bottom: 4px;
          transition: color var(--tcl-fast) var(--tcl-ease);
          display: flex;
          align-items: center;
          gap: 8px;
          flex-wrap: wrap;
        }

        .tcl-mega__card:hover .tcl-mega__card-title {
          color: var(--tcl-orange);
        }

        .tcl-mega__card-desc {
          font-size: 13px;
          font-weight: 400;
          color: var(--tcl-text-mid);
          line-height: 1.45;
        }

        .tcl-badge {
          display: inline-block;
          padding: 2px 8px;
          font-size: 10px;
          font-weight: 800;
          letter-spacing: 0.6px;
          background: #10b981;
          color: var(--tcl-white);
          border-radius: 4px;
          line-height: 1.4;
        }

        .tcl-badge--soon {
          background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .tcl-mega__content-inner {
          animation: tclSlideIn var(--tcl-fast) var(--tcl-ease);
        }

        @keyframes tclSlideIn {
          from { opacity: 0; transform: translateX(6px); }
          to   { opacity: 1; transform: translateX(0); }
        }

        /* ---- OVERLAY ---- */
        .tcl-overlay {
          position: fixed;
          inset: 0;
          background: rgba(15, 23, 42, 0.12);
          opacity: 0;
          visibility: hidden;
          transition: opacity var(--tcl-med) var(--tcl-ease), visibility var(--tcl-med);
          z-index: -1;
        }

        .tcl-overlay.is-open {
          opacity: 1;
          visibility: visible;
        }

        /* ---- MOBILE DRAWER ---- */
        .tcl-mob-bg {
          position: fixed;
          inset: 0;
          background: rgba(15, 23, 42, 0.45);
          opacity: 0;
          visibility: hidden;
          transition: opacity var(--tcl-med) var(--tcl-ease), visibility var(--tcl-med);
          z-index: 100;
        }

        .tcl-mob-bg.is-open {
          opacity: 1;
          visibility: visible;
        }

        .tcl-mob {
          position: fixed;
          top: 0;
          right: 0;
          width: 100%;
          max-width: 420px;
          height: 100dvh;
          background: var(--tcl-white);
          z-index: 101;
          transform: translateX(100%);
          transition: transform var(--tcl-slow) var(--tcl-ease);
          overflow-y: auto;
          overscroll-behavior: contain;
          box-shadow: -6px 0 32px rgba(0,0,0,0.12);
        }

        .tcl-mob.is-open {
          transform: translateX(0);
        }

        .tcl-mob__head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 16px 24px;
          border-bottom: 1px solid var(--tcl-border);
        }

        .tcl-mob__head-logo {
          font-family: 'Bebas Neue', sans-serif;
          font-weight: 400;
          font-size: 24px;
          letter-spacing: 0.05em;
          line-height: 1;
          text-transform: uppercase;
          white-space: nowrap;
          text-decoration: none;
          display: flex;
          align-items: baseline;
          -webkit-text-stroke: 0.5px currentColor;
        }

        .tcl-mob__head-logo .logo-main {
          color: var(--tcl-text);
        }

        .tcl-mob__head-logo .logo-accent {
          color: var(--tcl-logo-orange);
          margin-left: 0.18em;
        }

        .tcl-mob__close {
          background: none;
          border: none;
          cursor: pointer;
          padding: 8px;
          color: var(--tcl-text-mid);
          transition: color var(--tcl-fast);
          -webkit-tap-highlight-color: transparent;
        }

        .tcl-mob__close:hover { color: var(--tcl-text); }
        .tcl-mob__close svg { width: 24px; height: 24px; display: block; }

        .tcl-mob__acc {
          border-bottom: 1px solid var(--tcl-border);
        }

        .tcl-mob__acc-trigger {
          display: flex;
          align-items: center;
          justify-content: space-between;
          width: 100%;
          padding: 18px 24px;
          background: none;
          border: none;
          font-family: 'Outfit', system-ui, sans-serif;
          font-size: 16px;
          font-weight: 600;
          color: var(--tcl-text);
          cursor: pointer;
          text-align: left;
          -webkit-tap-highlight-color: transparent;
          transition: color var(--tcl-fast);
        }

        .tcl-mob__acc-trigger.is-open {
          color: var(--tcl-orange);
        }

        .tcl-mob__acc-trigger svg {
          width: 16px;
          height: 16px;
          flex-shrink: 0;
          transition: transform var(--tcl-slow) var(--tcl-ease);
        }

        .tcl-mob__acc-trigger.is-open svg {
          transform: rotate(180deg);
        }

        .tcl-mob__acc-body {
          max-height: 0;
          overflow: hidden;
          transition: max-height var(--tcl-slow) var(--tcl-ease);
        }

        .tcl-mob__group {
          padding: 0 24px 12px;
        }

        .tcl-mob__group-label {
          font-size: 11px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1.3px;
          color: var(--tcl-text-muted);
          padding: 14px 0 8px;
        }

        .tcl-mob__link {
          display: block;
          padding: 10px 0;
          text-decoration: none;
          border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .tcl-mob__link:last-child { border-bottom: none; }

        .tcl-mob__link-title {
          font-size: 14px;
          font-weight: 600;
          color: var(--tcl-text);
          display: flex;
          align-items: center;
          gap: 6px;
        }

        .tcl-mob__link-desc {
          font-size: 12px;
          color: var(--tcl-text-mid);
          margin-top: 2px;
          line-height: 1.4;
        }

        .tcl-mob__foot {
          padding: 24px;
          margin-top: 8px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .tcl-mob__foot .tcl-nav__login {
          display: block;
          text-align: center;
          width: 100%;
          padding: 14px 24px;
          font-size: 14px;
          color: var(--tcl-white);
          background: var(--tcl-orange);
          border-color: var(--tcl-orange);
        }

        .tcl-mob__foot .tcl-nav__login:hover {
          background: var(--tcl-orange-dark);
          border-color: var(--tcl-orange-dark);
          color: var(--tcl-white);
        }

        /* RESPONSIVE */
        @media (max-width: 960px) {
          .tcl-nav__menu,
          .tcl-nav__actions { display: none; }
          .tcl-nav__burger  { display: block; }
          .tcl-mega, .tcl-overlay { display: none !important; }
        }

        @media (max-width: 480px) {
          .tcl-mob { max-width: 100%; }
          .tcl-nav__logo { font-size: 24px; margin-right: 16px; }
        }
      </style>

      <!-- OVERLAY -->
      <div class="tcl-overlay" id="tclOverlay"></div>

      <div class="tcl-stripe"></div>

      <nav class="tcl-nav" role="navigation" aria-label="Main navigation">

          <div class="tcl-nav__menu" id="tclMenu">

              <svg class="tcl-nav__item-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5L6 7.5L9 4.5"/></svg>
            </div>
            <div class="tcl-nav__item" data-menu="software" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false">
              Software
              <svg class="tcl-nav__item-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5L6 7.5L9 4.5"/></svg>
            </div>
          </div>

          <div class="tcl-nav__actions">
            <a href="https://software.trafficcoplabs.com" class="tcl-nav__login">SOFTWARE LOGIN</a>
            <a href="https://training.trafficcoplabs.com" class="tcl-nav__login">TRAINING LOGIN</a>

          <button class="tcl-nav__burger" id="tclBurger" aria-label="Open menu">

        <!-- MEGA DROPDOWN -->
        <div class="tcl-mega" id="tclMega" role="region" aria-label="Submenu">
          <div class="tcl-mega__inner">
            <div class="tcl-mega__sidebar" id="tclSidebar"></div>

          </div>
        </div>
      </nav>

      <!-- MOBILE DRAWER -->
      <div class="tcl-mob-bg" id="tclMobBg"></div>
      <div class="tcl-mob" id="tclMob">
        <div class="tcl-mob__head">
          <a href="/" class="tcl-mob__head-logo">
            <span class="logo-main">TRAFFIC COP</span>
            <span class="logo-accent">LABS</span>
          </a>
          <button class="tcl-mob__close" id="tclMobClose" aria-label="Close menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>

        <div class="tcl-mob__nav" id="tclMobNav"></div>

          ]},
          { id: 'crime-scene', label: 'Crime Scene', links: [

        ]
      },

          ]},

          ]}
        ]
      },

          { id: 'photogrammetry', label: 'Photogrammetry', links: [

          ]},
          { id: 'video', label: 'Video Analysis', links: [
            { title: 'ChronoSnap', desc: "The World's Only Analysis Program Built for Crash Investigations", url: 'https://trafficcoplabs.com/chronosnap' }
          ]}
        ]
      }
    };

    const root      = shadow;
    const $mega     = root.getElementById('tclMega');
    const $sidebar  = root.getElementById('tclSidebar');
    const $content  = root.getElementById('tclContent');
    const $overlay  = root.getElementById('tclOverlay');
    const $burger   = root.getElementById('tclBurger');
    const $mob      = root.getElementById('tclMob');
    const $mobBg    = root.getElementById('tclMobBg');
    const $mobNav   = root.getElementById('tclMobNav');
    const $mobClose = root.getElementById('tclMobClose');
    const $navItems = root.querySelectorAll('.tcl-nav__item');

    let closeTimer    = null;
    let activeMenu    = null;
    let activeSection = null;

    const chevronRight = '<svg class="tcl-mega__side-chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l4 4-4 4"/></svg>';

    function openMega(menuKey) {
      if (activeMenu === menuKey) return;
      activeMenu = menuKey;
      activeSection = null;
      $navItems.forEach(el => {
        const isTarget = el.dataset.menu === menuKey;
        el.classList.toggle('is-active', isTarget);
        el.setAttribute('aria-expanded', isTarget);
      });
      const menu = MENU[menuKey];
      $sidebar.innerHTML = menu.sections.map((s, i) =>
        '<div class="tcl-mega__side-item' + (i === 0 ? ' is-active' : '') + '" data-section="' + s.id + '">' + s.label + chevronRight + '</div>'
      ).join('');
      $sidebar.querySelectorAll('.tcl-mega__side-item').forEach(el => {
        el.addEventListener('mouseenter', () => setSection(menuKey, el.dataset.section));
      });
      setSection(menuKey, menu.sections[0].id);
      $mega.classList.add('is-open');
      $overlay.classList.add('is-open');
    }

    function setSection(menuKey, sectionId) {
      if (activeSection === sectionId) return;
      activeSection = sectionId;
      $sidebar.querySelectorAll('.tcl-mega__side-item').forEach(el => {
        el.classList.toggle('is-active', el.dataset.section === sectionId);
      });
      const section = MENU[menuKey].sections.find(s => s.id === sectionId);
      if (!section) return;
      const cards = section.links.map(link => {
        let badge = '';
        if (link.badge) {
          const badgeClass = link.badgeClass ? 'tcl-badge ' + link.badgeClass : 'tcl-badge';
          badge = '<span class="' + badgeClass + '">' + link.badge + '</span>';
        }
        return '<a href="' + link.url + '" class="tcl-mega__card"><div class="tcl-mega__card-title">' + link.title + badge + '</div><div class="tcl-mega__card-desc">' + link.desc + '</div></a>';
      }).join('');
      $content.innerHTML = '<div class="tcl-mega__content-inner"><div class="tcl-mega__section-label">' + section.label + '</div><div class="tcl-mega__grid">' + cards + '</div></div>';
    }

    function closeMega() {
      activeMenu = null;
      activeSection = null;
      $mega.classList.remove('is-open');
      $overlay.classList.remove('is-open');
      $navItems.forEach(el => {
        el.classList.remove('is-active');
        el.setAttribute('aria-expanded', 'false');
      });
    }

    function startCloseTimer() { clearTimeout(closeTimer); closeTimer = setTimeout(closeMega, 220); }
    function cancelCloseTimer() { clearTimeout(closeTimer); }

    $navItems.forEach(el => {
      el.addEventListener('mouseenter', () => { cancelCloseTimer(); openMega(el.dataset.menu); });
      el.addEventListener('mouseleave', startCloseTimer);
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activeMenu === el.dataset.menu ? closeMega() : openMega(el.dataset.menu); }
        if (e.key === 'Escape') closeMega();
      });
    });

    $mega.addEventListener('mouseenter', cancelCloseTimer);
    $mega.addEventListener('mouseleave', startCloseTimer);
    $overlay.addEventListener('click', closeMega);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMega(); });

    /* MOBILE */
    function buildMobileNav() {
      let html = '';
      for (const [key, menu] of Object.entries(MENU)) {
        const chevDown = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>';
        let body = '';
        menu.sections.forEach(section => {
          body += '<div class="tcl-mob__group"><div class="tcl-mob__group-label">' + section.label + '</div>';
          section.links.forEach(link => {
            let badge = '';
            if (link.badge) {
              const badgeClass = link.badgeClass ? 'tcl-badge ' + link.badgeClass : 'tcl-badge';
              badge = '<span class="' + badgeClass + '">' + link.badge + '</span>';
            }
            body += '<a href="' + link.url + '" class="tcl-mob__link"><div class="tcl-mob__link-title">' + link.title + badge + '</div><div class="tcl-mob__link-desc">' + link.desc + '</div></a>';
          });
          body += '</div>';
        });
        html += '<div class="tcl-mob__acc"><button class="tcl-mob__acc-trigger" data-menu="' + key + '">' + menu.label + chevDown + '</button><div class="tcl-mob__acc-body">' + body + '</div></div>';
      }
      $mobNav.innerHTML = html;
      $mobNav.querySelectorAll('.tcl-mob__acc-trigger').forEach(trigger => {
        trigger.addEventListener('click', () => {
          const body = trigger.nextElementSibling;
          const isOpen = trigger.classList.contains('is-open');
          $mobNav.querySelectorAll('.tcl-mob__acc-trigger').forEach(t => {
            t.classList.remove('is-open');
            t.nextElementSibling.style.maxHeight = '0';
          });
          if (!isOpen) {
            trigger.classList.add('is-open');
            body.style.maxHeight = body.scrollHeight + 'px';
          }
        });
      });
    }

    function openMobile() {
      $mob.classList.add('is-open');
      $mobBg.classList.add('is-open');
      $burger.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closeMobile() {
      $mob.classList.remove('is-open');
      $mobBg.classList.remove('is-open');
      $burger.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    $burger.addEventListener('click', () => { $mob.classList.contains('is-open') ? closeMobile() : openMobile(); });
    $mobClose.addEventListener('click', closeMobile);
    $mobBg.addEventListener('click', closeMobile);
    buildMobileNav();
  }
}

customElements.define('tcl-navbar', TCLNavbar);

          color: var(--tcl-text);
          line-height: 1.7;
        }

        /* ============================================================
           HARDWARE SPOTLIGHT
           ============================================================ */
        .hardware {
          background: var(--tcl-dark);
          padding: 100px 32px;
          border-top: 1px solid var(--tcl-border);
          position: relative;
          overflow: hidden;
        }

        .hardware::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: 
            radial-gradient(ellipse at 20% 30%, var(--tcl-blue-dim) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 80%, var(--tcl-purple-dim) 0%, transparent 40%);
          pointer-events: none;
        }

        .hardware__inner {
          position: relative;
          z-index: 1;
          max-width: var(--tcl-max-w);
          margin: 0 auto;
        }

        .hardware__grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 32px;
          margin-top: 56px;
        }

        .hardware-card {
          position: relative;
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 20px;
          overflow: hidden;
          transition: all 0.35s var(--ease-out);
        }

        .hardware-card:hover {
          border-color: var(--tcl-border-hover);
          transform: translateY(-6px);
          box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        }

        .hardware-card--featured {
          grid-column: 1 / -1;
          display: grid;
          grid-template-columns: 1.1fr 1fr;
          gap: 0;
        }

        .hardware-card--featured:hover {
          border-color: rgba(107, 142, 255, 0.4);
        }

        .hardware-card__image {
          position: relative;
          background: linear-gradient(135deg, #0d1220 0%, #0a0c10 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px;
          min-height: 320px;
        }

        .hardware-card__image img {
          max-width: 100%;
          max-height: 280px;
          object-fit: contain;
          filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5));
          transition: transform 0.5s var(--ease-out);
        }

        .hardware-card:hover .hardware-card__image img {
          transform: scale(1.05);
        }

        .hardware-card__badge {
          position: absolute;
          top: 20px;
          left: 20px;
          padding: 8px 16px;
          background: var(--tcl-blue-dim);
          border: 1px solid var(--tcl-blue);
          border-radius: 100px;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          color: var(--tcl-blue);
        }

        .hardware-card__content {
          padding: 40px;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }

        .hardware-card__eyebrow {
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: var(--tcl-blue);
          margin-bottom: 12px;
        }

        .hardware-card__title {
          font-family: 'Bebas Neue', sans-serif;
          font-size: clamp(2rem, 4vw, 2.8rem);
          letter-spacing: 0.02em;
          color: var(--tcl-white);
          margin-bottom: 16px;
          line-height: 1;
        }

        .hardware-card__desc {
          font-size: 15px;
          color: var(--tcl-text-mid);
          line-height: 1.7;
          margin-bottom: 24px;
        }

        .hardware-card__specs {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-bottom: 28px;
        }

        .hardware-card__spec {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 10px 16px;
          background: var(--tcl-dark);
          border: 1px solid var(--tcl-border);
          border-radius: 8px;
          font-size: 13px;
          color: var(--tcl-text);
        }

        .hardware-card__spec svg {
          width: 16px;
          height: 16px;
          color: var(--tcl-blue);
        }

        .hardware-card__price {
          display: flex;
          align-items: baseline;
          gap: 12px;
          margin-bottom: 24px;
        }

        .hardware-card__price-amount {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 2.5rem;
          color: var(--tcl-white);
          letter-spacing: 0.02em;
        }

        .hardware-card__price-note {
          font-size: 13px;
          color: var(--tcl-text-muted);
        }

        .hardware-card__cta {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 14px 28px;
          background: var(--tcl-blue);
          border-radius: 10px;
          font-size: 13px;
          font-weight: 700;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--tcl-white);
          transition: all 0.25s var(--ease-out);
          width: fit-content;
        }

        .hardware-card__cta:hover {
          background: #8aa8ff;
          transform: translateY(-3px);
          box-shadow: 0 12px 32px rgba(107, 142, 255, 0.35);
        }

        .hardware-card__cta svg {
          width: 16px;
          height: 16px;
        }

        /* SG6 Secondary Card */
        .hardware-card--secondary .hardware-card__image {
          min-height: 240px;
          padding: 32px;
        }

        .hardware-card--secondary .hardware-card__content {
          padding: 28px;
        }

        .hardware-card--secondary .hardware-card__title {
          font-size: 1.8rem;
        }

        .hardware-card--secondary .hardware-card__badge {
          background: var(--tcl-purple-dim);
          border-color: var(--tcl-purple);
          color: var(--tcl-purple);
        }

        .hardware-card--secondary .hardware-card__eyebrow {
          color: var(--tcl-purple);
        }

        .hardware-card--secondary .hardware-card__spec svg {
          color: var(--tcl-purple);
        }

        .hardware-card--secondary .hardware-card__cta {
          background: var(--tcl-purple);
        }

        .hardware-card--secondary .hardware-card__cta:hover {
          background: #bb7af7;
          box-shadow: 0 12px 32px rgba(168, 85, 247, 0.35);
        }

        .hardware-card--secondary:hover {
          border-color: rgba(168, 85, 247, 0.4);
        }

        /* Host a Class Card */
        .hardware-card--host {
          background: linear-gradient(135deg, var(--tcl-dark-mid) 0%, var(--tcl-dark) 100%);
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          text-align: center;
          padding: 48px 32px;
          min-height: 400px;
        }

        .hardware-card--host .hardware-card__icon {
          width: 72px;
          height: 72px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: var(--tcl-orange-dim);
          border-radius: 20px;
          margin-bottom: 24px;
          color: var(--tcl-orange);
        }

        .hardware-card--host .hardware-card__icon svg {
          width: 36px;
          height: 36px;
        }

        .hardware-card--host .hardware-card__title {
          font-size: 2rem;
          margin-bottom: 12px;
        }

        .hardware-card--host .hardware-card__desc {
          max-width: 300px;
          margin-bottom: 28px;
        }

        .hardware-card--host .hardware-card__cta {
          background: var(--tcl-orange);
          color: var(--tcl-black);
        }

        .hardware-card--host .hardware-card__cta:hover {
          background: #ffb940;
          box-shadow: 0 12px 32px var(--tcl-orange-glow);
        }

        .hardware-card--host:hover {
          border-color: rgba(245, 166, 35, 0.4);
        }

        /* ============================================================
           SOFTWARE SPOTLIGHT
           ============================================================ */
        .software {
          background: var(--tcl-black);
          border-top: 1px solid var(--tcl-border);
          padding: 100px 32px;
          position: relative;
          overflow: hidden;
        }

        .software::before {
          content: '';
          position: absolute;
          inset: 0;
          background: 
            radial-gradient(ellipse at 70% 20%, var(--tcl-cyan-dim) 0%, transparent 50%),
            radial-gradient(ellipse at 20% 80%, var(--tcl-blue-dim) 0%, transparent 40%);
          pointer-events: none;
        }

        .software__inner {
          position: relative;
          z-index: 1;
          max-width: var(--tcl-max-w);
          margin: 0 auto;
        }

        .software__featured {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 48px;
          align-items: center;
          margin-bottom: 56px;
          padding: 48px;
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 24px;
          transition: all 0.35s var(--ease-out);
        }

        .software__featured:hover {
          border-color: rgba(0, 212, 255, 0.4);
          box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
        }

        .software__featured-image {
          position: relative;
          border-radius: 16px;
          overflow: hidden;
          border: 1px solid var(--tcl-border);
          box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .software__featured-image img {
          width: 100%;
          height: auto;
        }

        .software__featured-badge {
          position: absolute;
          top: 16px;
          left: 16px;
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 8px 16px;
          background: rgba(0, 212, 255, 0.2);
          border: 1px solid var(--tcl-cyan);
          border-radius: 100px;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          color: var(--tcl-cyan);
        }

        .software__featured-badge-dot {
          width: 8px;
          height: 8px;
          background: var(--tcl-cyan);
          border-radius: 50%;
          animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }

        .software__featured-content {
          padding: 16px 0;
        }

        .software__featured-eyebrow {
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: var(--tcl-cyan);
          margin-bottom: 16px;
        }

        .software__featured-title {
          font-family: 'Bebas Neue', sans-serif;
          font-size: clamp(2.5rem, 5vw, 3.5rem);
          letter-spacing: 0.02em;
          color: var(--tcl-white);
          margin-bottom: 16px;
          line-height: 0.95;
          background: linear-gradient(135deg, var(--tcl-white) 0%, var(--tcl-cyan) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .software__featured-tagline {
          font-size: 17px;
          font-weight: 500;
          font-style: italic;
          color: var(--tcl-cyan);
          margin-bottom: 16px;
        }

        .software__featured-desc {
          font-size: 15px;
          color: var(--tcl-text-mid);
          line-height: 1.7;
          margin-bottom: 24px;
        }

        .software__featured-highlights {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-bottom: 28px;
        }

        .software__featured-highlight {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 10px 16px;
          background: var(--tcl-dark);
          border: 1px solid var(--tcl-border);
          border-radius: 8px;
          font-size: 13px;
          color: var(--tcl-text);
        }

        .software__featured-highlight svg {
          width: 16px;
          height: 16px;
          color: var(--tcl-cyan);
        }

        .software__featured-pricing {
          display: flex;
          align-items: center;
          gap: 24px;
          margin-bottom: 28px;
          padding: 20px 24px;
          background: var(--tcl-dark);
          border: 1px solid var(--tcl-border);
          border-radius: 12px;
        }

        .software__featured-price {
          text-align: center;
        }

        .software__featured-price-label {
          font-size: 10px;
          font-weight: 700;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--tcl-text-muted);
          margin-bottom: 4px;
        }

        .software__featured-price-amount {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 1.5rem;
          color: var(--tcl-white);
          letter-spacing: 0.02em;
        }

        .software__featured-price-period {
          font-size: 12px;
          color: var(--tcl-text-muted);
        }

        .software__featured-cta {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 14px 28px;
          background: var(--tcl-cyan);
          border-radius: 10px;
          font-size: 13px;
          font-weight: 700;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--tcl-black);
          transition: all 0.25s var(--ease-out);
        }

        .software__featured-cta:hover {
          background: #33e0ff;
          transform: translateY(-3px);
          box-shadow: 0 12px 32px rgba(0, 212, 255, 0.35);
        }

        .software__featured-cta svg {
          width: 16px;
          height: 16px;
        }

        /* Other Software Grid */
        .software__grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 24px;
        }

        .software-card {
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 16px;
          padding: 28px;
          transition: all 0.35s var(--ease-out);
        }

        .software-card:hover {
          border-color: var(--tcl-border-hover);
          transform: translateY(-4px);
        }

        .software-card__icon {
          width: 56px;
          height: 56px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: var(--tcl-blue-dim);
          border-radius: 14px;
          margin-bottom: 20px;
        }

        .software-card__icon svg {
          width: 28px;
          height: 28px;
          color: var(--tcl-blue);
        }

        .software-card__title {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 1.4rem;
          letter-spacing: 0.02em;
          color: var(--tcl-white);
          margin-bottom: 8px;
        }

        .software-card__desc {
          font-size: 14px;
          color: var(--tcl-text-mid);
          line-height: 1.6;
          margin-bottom: 16px;
        }

        .software-card__price {
          font-size: 13px;
          font-weight: 600;
          color: var(--tcl-green);
          margin-bottom: 16px;
        }

        .software-card__link {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--tcl-blue);
          transition: gap 0.2s var(--ease-out);
        }

        .software-card__link:hover {
          gap: 10px;
        }

        .software-card__link svg {
          width: 14px;
          height: 14px;
        }

        .software-card--free .software-card__icon {
          background: var(--tcl-green-dim);
        }

        .software-card--free .software-card__icon svg {
          color: var(--tcl-green);
        }

        .software-card--free .software-card__link {
          color: var(--tcl-green);
        }

        /* ============================================================
           TRAINING CAROUSEL
           ============================================================ */
        .training {
          padding: 100px 0;
          background: var(--tcl-dark);
          border-top: 1px solid var(--tcl-border);
          overflow: hidden;
        }

        .training__header {
          max-width: var(--tcl-max-w);
          margin: 0 auto 48px;
          padding: 0 32px;
          display: flex;
          justify-content: space-between;
          align-items: flex-end;
          flex-wrap: wrap;
          gap: 24px;
        }

        .training__header-left {
          max-width: 500px;
        }

        .training__header-right {
          display: flex;
          align-items: center;
          gap: 16px;
        }

        .training__link {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          font-size: 14px;
          font-weight: 600;
          color: var(--tcl-orange);
          transition: gap 0.2s var(--ease-out);
        }

        .training__link:hover {
          gap: 12px;
        }

        .training__link svg {
          width: 18px;
          height: 18px;
        }

        .carousel-nav {
          display: flex;
          gap: 8px;
        }

        .carousel-nav__btn {
          width: 44px;
          height: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 10px;
          color: var(--tcl-text-mid);
          cursor: pointer;
          transition: all 0.25s var(--ease-out);
        }

        .carousel-nav__btn:hover {
          background: var(--tcl-orange);
          border-color: var(--tcl-orange);
          color: var(--tcl-black);
          transform: scale(1.05);
        }

        .carousel-nav__btn:active {
          transform: scale(0.95);
        }

        .carousel-nav__btn svg {
          width: 20px;
          height: 20px;
        }

        .carousel-wrap {
          position: relative;
          max-width: var(--tcl-max-w);
          margin: 0 auto;
          padding: 0 32px;
        }

        .carousel {
          display: flex;
          gap: 20px;
          overflow-x: auto;
          scroll-snap-type: x mandatory;
          scrollbar-width: none;
          -ms-overflow-style: none;
          -webkit-overflow-scrolling: touch;
          scroll-behavior: smooth;
          padding-bottom: 8px;
        }

        .carousel::-webkit-scrollbar {
          display: none;
        }

        .course-card {
          flex: 0 0 280px;
          scroll-snap-align: start;
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 14px;
          overflow: hidden;
          transition: all 0.35s var(--ease-out);
        }

        .course-card:hover {
          border-color: rgba(245, 166, 35, 0.3);
          transform: translateY(-4px);
          box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        .course-card__image {
          position: relative;
          height: 140px;
          overflow: hidden;
        }

        .course-card__image img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          transition: transform 0.5s var(--ease-out);
        }

        .course-card:hover .course-card__image img {
          transform: scale(1.05);
        }

        .course-card__image-overlay {
          position: absolute;
          inset: 0;
          background: linear-gradient(180deg, transparent 40%, rgba(10, 12, 16, 0.9) 100%);
        }

        .course-card__badges {
          position: absolute;
          top: 12px;
          left: 12px;
          display: flex;
          flex-wrap: wrap;
          gap: 6px;
        }

        .course-card__badge {
          padding: 5px 10px;
          background: rgba(10, 12, 16, 0.85);
          backdrop-filter: blur(8px);
          border-radius: 5px;
          font-size: 9px;
          font-weight: 700;
          letter-spacing: 1px;
          text-transform: uppercase;
        }

        .course-card__badge--online {
          color: var(--tcl-green);
          border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .course-card__badge--inperson {
          color: var(--tcl-orange);
          border: 1px solid rgba(245, 166, 35, 0.4);
        }

        .course-card__badge--virtual {
          color: var(--tcl-cyan);
          border: 1px solid rgba(0, 212, 255, 0.4);
        }

        .course-card__content {
          padding: 18px;
        }

        .course-card__title {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 1.25rem;
          letter-spacing: 0.02em;
          color: var(--tcl-white);
          margin-bottom: 6px;
          line-height: 1.1;
        }

        .course-card__desc {
          font-size: 13px;
          color: var(--tcl-text-mid);
          line-height: 1.5;
          margin-bottom: 12px;
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
        }

        .course-card__meta {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          padding-top: 12px;
          border-top: 1px solid var(--tcl-border);
        }

        .course-card__meta-item {
          display: flex;
          align-items: center;
          gap: 5px;
          font-size: 11px;
          color: var(--tcl-text-muted);
        }

        .course-card__meta-item svg {
          width: 12px;
          height: 12px;
          color: var(--tcl-orange);
        }

        .course-card__cta {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-top: 14px;
          padding-top: 12px;
          border-top: 1px solid var(--tcl-border);
        }

        .course-card__price {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 1.15rem;
          color: var(--tcl-orange);
          letter-spacing: 0.02em;
        }

        .course-card__link {
          display: inline-flex;
          align-items: center;
          gap: 5px;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 1px;
          text-transform: uppercase;
          color: var(--tcl-orange);
          transition: gap 0.2s var(--ease-out);
        }

        .course-card__link:hover {
          gap: 8px;
        }

        .course-card__link svg {
          width: 12px;
          height: 12px;
        }

        /* ============================================================
           FOOTPRINT SECTION
           ============================================================ */
        .footprint {
          padding: 100px 32px;
          background: var(--tcl-black);
          border-top: 1px solid var(--tcl-border);
        }

        .footprint__inner {
          max-width: var(--tcl-max-w);
          margin: 0 auto;
        }

        .footprint__grid {
          display: grid;
          grid-template-columns: 1.4fr 1fr;
          gap: 56px;
          align-items: center;
        }

        .footprint__map-wrap {
          position: relative;
        }

        .footprint__map {
          width: 100%;
          height: auto;
          border-radius: 16px;
          border: 1px solid var(--tcl-border);
        }

        .footprint__map-caption {
          margin-top: 12px;
          font-size: 12px;
          color: var(--tcl-text-muted);
          text-align: center;
        }

        .footprint__content {
          display: flex;
          flex-direction: column;
          gap: 24px;
        }

        .footprint__text {
          font-size: 16px;
          font-weight: 400;
          line-height: 1.8;
          color: var(--tcl-text-mid);
        }

        .footprint__text strong {

    const scrollLinks = shadow.querySelectorAll('.js-scroll-link');
    
    scrollLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        
        // Get target from data-target attribute or href
        let targetId = link.dataset.target || link.getAttribute('href');
        if (targetId && targetId.startsWith('#')) {
          targetId = targetId.substring(1);
        }
        
        if (targetId) {
          const targetElement = shadow.getElementById(targetId);
          if (targetElement) {
            // Get the position relative to the document
            const hostRect = this.getBoundingClientRect();
            const targetRect = targetElement.getBoundingClientRect();
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const targetPosition = targetRect.top + scrollTop - 80; // 80px offset for nav
            
            window.scrollTo({
              top: targetPosition,
              behavior: 'smooth'
            });
          }
        }
      });
    });

    // Also handle any anchor links with href="#..."
    const anchorLinks = shadow.querySelectorAll('a[href^="#"]');
    anchorLinks.forEach(link => {
      if (!link.classList.contains('js-scroll-link')) {
        link.addEventListener('click', (e) => {
          const targetId = link.getAttribute('href').substring(1);
          if (targetId) {
            const targetElement = shadow.getElementById(targetId);
            if (targetElement) {
              e.preventDefault();
              const targetRect = targetElement.getBoundingClientRect();
              const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
              const targetPosition = targetRect.top + scrollTop - 80;
              
              window.scrollTo({
                top: targetPosition,
                behavior: 'smooth'
              });
            }
          }
        });
      }
    });

    // ============================================================
    // CAROUSEL NAVIGATION
    // ============================================================
    const carousel = shadow.querySelector('.carousel');
    const prevBtn = shadow.querySelector('.carousel-nav__btn--prev');
    const nextBtn = shadow.querySelector('.carousel-nav__btn--next');
    
    if (carousel && prevBtn && nextBtn) {
      const cardWidth = 300; // card width + gap
      
      prevBtn.addEventListener('click', () => {
        carousel.scrollBy({
          left: -cardWidth,
          behavior: 'smooth'
        });
      });
      
      nextBtn.addEventListener('click', () => {
        carousel.scrollBy({
          left: cardWidth,
          behavior: 'smooth'
        });
      });
    }
  }
}

</script>
