<script>
class TCLNavbar extends HTMLElement {
  connectedCallback() {
    const shadow = this.attachShadow({ mode: 'open' });

    shadow.innerHTML = `
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap');

        /* ============================================================
           RESET & VARIABLES — scoped to shadow root
           ============================================================ */
        *, *::before, *::after {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        :host {
          display: block;
          position: sticky;
          top: 0;
          z-index: 9999;
          font-family: 'Outfit', system-ui, -apple-system, sans-serif;
          font-size: 16px;
          line-height: 1.5;
          color: #1e293b;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; }
        img { display: block; }

        /* ---- VARIABLES ---- */
        :host {
          --tcl-navy:        #1a2d42;
          --tcl-blue:        #3a7ca5;
          --tcl-orange:      #e8921b;
          --tcl-orange-dark: #cf7e10;
          --tcl-logo-cream:  #F2F2F2;
          --tcl-logo-orange: #F5A623;
          --tcl-white:       #ffffff;
          --tcl-off-white:   #f7f8fa;
          --tcl-border:      #e5e7eb;
          --tcl-text:        #1e293b;
          --tcl-text-mid:    #64748b;
          --tcl-text-muted:  #94a3b8;
          --tcl-nav-h:       72px;
          --tcl-sidebar-w:   224px;
          --tcl-max-w:       1280px;
          --tcl-ease:        cubic-bezier(0.4, 0, 0.2, 1);
          --tcl-fast:        0.18s;
          --tcl-med:         0.25s;
          --tcl-slow:        0.35s;
        }

        /* ---- BRAND STRIPE ---- */
        .tcl-stripe {
          height: 2px;
          background: linear-gradient(90deg, var(--tcl-orange), var(--tcl-blue));
          opacity: 0.6;
        }

        /* ---- NAVBAR BAR ---- */
        .tcl-nav {
          background: rgba(15, 20, 30, 0.92);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          height: var(--tcl-nav-h);
          border-bottom: 1px solid rgba(255,255,255,0.08);
          position: relative;
          overflow: visible;
        }

        .tcl-nav__inner {
          max-width: var(--tcl-max-w);
          margin: 0 auto;
          padding: 0 28px;
          height: 100%;
          display: flex;
          align-items: center;
        }

        /* ---- TEXT LOGO ---- */
        .tcl-nav__logo {
          display: flex;
          align-items: baseline;
          text-decoration: none;
          flex-shrink: 0;
          margin-right: 44px;
          font-family: 'Bebas Neue', sans-serif;
          font-weight: 400;
          font-size: 30px;
          letter-spacing: 0.05em;
          line-height: 1;
          text-transform: uppercase;
          white-space: nowrap;
          -webkit-text-stroke: 0.5px currentColor;
          transition: opacity var(--tcl-fast) var(--tcl-ease);
        }

        .tcl-nav__logo:hover {
          opacity: 0.85;
        }

        .tcl-nav__logo-main {
          color: var(--tcl-logo-cream);
        }

        .tcl-nav__logo-accent {
          color: var(--tcl-logo-orange);
          margin-left: 0.18em;
        }

        /* Desktop menu items */
        .tcl-nav__menu {
          display: flex;
          align-items: center;
          gap: 4px;
        }

        .tcl-nav__item {
          display: flex;
          align-items: center;
          gap: 7px;
          padding: 10px 20px;
          font-size: 15px;
          font-weight: 600;
          color: rgba(255,255,255,0.85);
          cursor: pointer;
          border-radius: 8px;
          transition: color var(--tcl-fast) var(--tcl-ease),
                      background var(--tcl-fast) var(--tcl-ease);
          user-select: none;
          white-space: nowrap;
        }

        .tcl-nav__item:hover,
        .tcl-nav__item.is-active {
          color: var(--tcl-orange);
          background: rgba(232,146,27,0.1);
        }

        .tcl-nav__item-chevron {
          width: 11px;
          height: 11px;
          transition: transform var(--tcl-fast) var(--tcl-ease);
          flex-shrink: 0;
        }

        .tcl-nav__item.is-active .tcl-nav__item-chevron {

          margin-left: auto;
          display: flex;
          align-items: center;
          gap: 12px;
        }

          display: inline-flex;
          align-items: center;
          padding: 10px 24px;
          font-size: 13.5px;
          font-weight: 700;
          letter-spacing: 0.6px;
          color: rgba(255,255,255,0.9);
          background: transparent;
          border: 1.5px solid rgba(255,255,255,0.35);
          border-radius: 8px;
          text-decoration: none;
          cursor: pointer;
          transition: background var(--tcl-fast) var(--tcl-ease),
                      border-color var(--tcl-fast) var(--tcl-ease),
                      color var(--tcl-fast) var(--tcl-ease),
                      transform 0.12s ease;
          white-space: nowrap;
        }

        .tcl-nav__login:hover {
          background: rgba(255,255,255,0.08);
          border-color: var(--tcl-orange);
          color: var(--tcl-orange);
          transform: translateY(-1px);
        }

        /* Hamburger */
        .tcl-nav__burger {
          display: none;
          background: none;
          border: none;
          cursor: pointer;
          padding: 8px;
          margin-left: 16px;
          -webkit-tap-highlight-color: transparent;
        }

        .tcl-nav__burger-line {
          display: block;
          width: 24px;
          height: 2.5px;
          background: var(--tcl-white);
          border-radius: 2px;
          transition: transform var(--tcl-slow) var(--tcl-ease),

        .tcl-nav__burger.is-open .tcl-nav__burger-line:nth-child(1) {
          transform: translateY(7.5px) rotate(45deg);
        }
        .tcl-nav__burger.is-open .tcl-nav__burger-line:nth-child(2) {
          opacity: 0;
        }
        .tcl-nav__burger.is-open .tcl-nav__burger-line:nth-child(3) {
          transform: translateY(-7.5px) rotate(-45deg);

          visibility: hidden;
          transform: translateY(-6px);
          transition: opacity var(--tcl-med) var(--tcl-ease),
                      transform var(--tcl-med) var(--tcl-ease),
                      visibility var(--tcl-med);
          pointer-events: none;
        }

        .tcl-mega.is-open {
          opacity: 1;
          visibility: visible;
          transform: translateY(0);
          pointer-events: auto;
        }

        .tcl-mega__inner {

          border-left: 3px solid transparent;
          transition: all var(--tcl-fast) var(--tcl-ease);
        }

        .tcl-mega__side-item:hover {
          background: rgba(0,0,0,0.025);
        }

        .tcl-mega__side-item.is-active {
          background: var(--tcl-white);
          border-left-color: var(--tcl-orange);
          color: var(--tcl-orange);
          font-weight: 600;
        }

        .tcl-mega__side-chevron {
          width: 13px;
          height: 13px;
          opacity: 0.35;
          transition: opacity var(--tcl-fast) var(--tcl-ease),
                      transform var(--tcl-fast) var(--tcl-ease);
          flex-shrink: 0;
        }

        .tcl-mega__side-item.is-active .tcl-mega__side-chevron {
          opacity: 0.7;
          transform: translateX(2px);
        }

        /* Content area */
        .tcl-mega__content {
          flex: 1;
          padding: 32px 44px 36px;
        }

        .tcl-mega__section-label {
          font-size: 11.5px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 1.4px;
          color: var(--tcl-text-muted);
          margin-bottom: 20px;
          padding-bottom: 14px;
          border-bottom: 1px solid var(--tcl-border);
        }

        .tcl-mega__grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 6px;
        }

        .tcl-mega__card {
          display: block;
          padding: 16px 20px;
          border-radius: 10px;
          text-decoration: none;
          transition: background var(--tcl-fast) var(--tcl-ease);
        }

        .tcl-mega__card:hover {
          background: var(--tcl-off-white);
        }

        .tcl-mega__card-title {
          font-size: 15px;
          font-weight: 600;
          color: var(--tcl-text);
          margin-bottom: 4px;
          transition: color var(--tcl-fast) var(--tcl-ease);
          display: flex;
          align-items: center;
          gap: 8px;
          flex-wrap: wrap;
        }

        .tcl-mega__card:hover .tcl-mega__card-title {
          color: var(--tcl-orange);
        }

        .tcl-mega__card-desc {
          font-size: 13px;
          font-weight: 400;
          color: var(--tcl-text-mid);
          line-height: 1.45;
        }

        .tcl-badge {
          display: inline-block;
          padding: 2px 8px;
          font-size: 10px;
          font-weight: 800;
          letter-spacing: 0.6px;
          background: #10b981;
          color: var(--tcl-white);
          border-radius: 4px;
          line-height: 1.4;
        }

        .tcl-badge--soon {
          background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .tcl-mega__content-inner {
          animation: tclSlideIn var(--tcl-fast) var(--tcl-ease);
        }

        @keyframes tclSlideIn {
          from { opacity: 0; transform: translateX(6px); }
          to   { opacity: 1; transform: translateX(0); }
        }

        /* ---- OVERLAY ---- */
        .tcl-overlay {
          position: fixed;
          inset: 0;
          background: rgba(15, 23, 42, 0.12);
          opacity: 0;
          visibility: hidden;
          transition: opacity var(--tcl-med) var(--tcl-ease), visibility var(--tcl-med);
          z-index: -1;
        }

        .tcl-overlay.is-open {
          opacity: 1;
          visibility: visible;
        }

        /* ---- MOBILE DRAWER ---- */
        .tcl-mob-bg {
          position: fixed;
          inset: 0;
          background: rgba(15, 23, 42, 0.45);
          opacity: 0;
          visibility: hidden;
          transition: opacity var(--tcl-med) var(--tcl-ease), visibility var(--tcl-med);

          opacity: 1;
          visibility: visible;
        }

          position: fixed;
          top: 0;
          right: 0;
          width: 100%;
          max-width: 420px;
          height: 100dvh;

        .tcl-mob__head-logo .logo-accent {

        .tcl-mob__close {

          cursor: pointer;
          padding: 8px;
          color: var(--tcl-text-mid);
          transition: color var(--tcl-fast);

        .tcl-mob__close:hover { color: var(--tcl-text); }

          ]}

    };

    const root      = shadow;
    const $mega     = root.getElementById('tclMega');
    const $sidebar  = root.getElementById('tclSidebar');
    const $content  = root.getElementById('tclContent');
    const $overlay  = root.getElementById('tclOverlay');
    const $burger   = root.getElementById('tclBurger');
    const $mob      = root.getElementById('tclMob');
    const $mobBg    = root.getElementById('tclMobBg');
    const $mobNav   = root.getElementById('tclMobNav');
    const $mobClose = root.getElementById('tclMobClose');
    const $navItems = root.querySelectorAll('.tcl-nav__item');

    let closeTimer    = null;
    let activeMenu    = null;
    let activeSection = null;

    const chevronRight = '<svg class="tcl-mega__side-chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l4 4-4 4"/></svg>';

    function openMega(menuKey) {
      if (activeMenu === menuKey) return;
      activeMenu = menuKey;
      activeSection = null;
      $navItems.forEach(el => {
        const isTarget = el.dataset.menu === menuKey;
        el.classList.toggle('is-active', isTarget);
        el.setAttribute('aria-expanded', isTarget);
      });
      const menu = MENU[menuKey];
      $sidebar.innerHTML = menu.sections.map((s, i) =>
        '<div class="tcl-mega__side-item' + (i === 0 ? ' is-active' : '') + '" data-section="' + s.id + '">' + s.label + chevronRight + '</div>'
      ).join('');
      $sidebar.querySelectorAll('.tcl-mega__side-item').forEach(el => {
        el.addEventListener('mouseenter', () => setSection(menuKey, el.dataset.section));
      });
      setSection(menuKey, menu.sections[0].id);
      $mega.classList.add('is-open');
      $overlay.classList.add('is-open');
    }

    function setSection(menuKey, sectionId) {
      if (activeSection === sectionId) return;
      activeSection = sectionId;
      $sidebar.querySelectorAll('.tcl-mega__side-item').forEach(el => {
        el.classList.toggle('is-active', el.dataset.section === sectionId);
      });
      const section = MENU[menuKey].sections.find(s => s.id === sectionId);
      if (!section) return;
      const cards = section.links.map(link => {
        let badge = '';
        if (link.badge) {
          const badgeClass = link.badgeClass ? 'tcl-badge ' + link.badgeClass : 'tcl-badge';
          badge = '<span class="' + badgeClass + '">' + link.badge + '</span>';
        }
        return '<a href="' + link.url + '" class="tcl-mega__card"><div class="tcl-mega__card-title">' + link.title + badge + '</div><div class="tcl-mega__card-desc">' + link.desc + '</div></a>';
      }).join('');
      $content.innerHTML = '<div class="tcl-mega__content-inner"><div class="tcl-mega__section-label">' + section.label + '</div><div class="tcl-mega__grid">' + cards + '</div></div>';
    }

    function closeMega() {
      activeMenu = null;
      activeSection = null;
      $mega.classList.remove('is-open');
      $overlay.classList.remove('is-open');
      $navItems.forEach(el => {
        el.classList.remove('is-active');
        el.setAttribute('aria-expanded', 'false');
      });
    }

    function startCloseTimer() { clearTimeout(closeTimer); closeTimer = setTimeout(closeMega, 220); }
    function cancelCloseTimer() { clearTimeout(closeTimer); }

    $navItems.forEach(el => {
      el.addEventListener('mouseenter', () => { cancelCloseTimer(); openMega(el.dataset.menu); });
      el.addEventListener('mouseleave', startCloseTimer);
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activeMenu === el.dataset.menu ? closeMega() : openMega(el.dataset.menu); }
        if (e.key === 'Escape') closeMega();
      });
    });

    $mega.addEventListener('mouseenter', cancelCloseTimer);
    $mega.addEventListener('mouseleave', startCloseTimer);
    $overlay.addEventListener('click', closeMega);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMega(); });

    /* MOBILE */
    function buildMobileNav() {
      let html = '';
      for (const [key, menu] of Object.entries(MENU)) {
        const chevDown = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>';
        let body = '';
        menu.sections.forEach(section => {
          body += '<div class="tcl-mob__group"><div class="tcl-mob__group-label">' + section.label + '</div>';
          section.links.forEach(link => {
            let badge = '';
            if (link.badge) {
              const badgeClass = link.badgeClass ? 'tcl-badge ' + link.badgeClass : 'tcl-badge';
              badge = '<span class="' + badgeClass + '">' + link.badge + '</span>';
            }
            body += '<a href="' + link.url + '" class="tcl-mob__link"><div class="tcl-mob__link-title">' + link.title + badge + '</div><div class="tcl-mob__link-desc">' + link.desc + '</div></a>';
          });
          body += '</div>';
        });
        html += '<div class="tcl-mob__acc"><button class="tcl-mob__acc-trigger" data-menu="' + key + '">' + menu.label + chevDown + '</button><div class="tcl-mob__acc-body">' + body + '</div></div>';
      }
      $mobNav.innerHTML = html;
      $mobNav.querySelectorAll('.tcl-mob__acc-trigger').forEach(trigger => {
        trigger.addEventListener('click', () => {
          const body = trigger.nextElementSibling;
          const isOpen = trigger.classList.contains('is-open');
          $mobNav.querySelectorAll('.tcl-mob__acc-trigger').forEach(t => {
            t.classList.remove('is-open');
            t.nextElementSibling.style.maxHeight = '0';
          });
          if (!isOpen) {
            trigger.classList.add('is-open');
            body.style.maxHeight = body.scrollHeight + 'px';
          }
        });
      });
    }

    function openMobile() {
      $mob.classList.add('is-open');
      $mobBg.classList.add('is-open');
      $burger.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closeMobile() {
      $mob.classList.remove('is-open');
      $mobBg.classList.remove('is-open');
      $burger.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    $burger.addEventListener('click', () => { $mob.classList.contains('is-open') ? closeMobile() : openMobile(); });
    $mobClose.addEventListener('click', closeMobile);
    $mobBg.addEventListener('click', closeMobile);
    buildMobileNav();
  }
}

customElements.define('tcl-navbar', TCLNavbar);
</script>

        .module__number {
          width: 44px;
          height: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: var(--tcl-orange-dim);
          border-radius: 10px;
          font-family: var(--font-display);
          font-size: 20px;
          color: var(--tcl-orange);
          flex-shrink: 0;
        }
        .module__number--bonus {
          font-size: 14px;
          background: var(--tcl-green-dim);
          color: var(--tcl-green);
        }
        .module__title { flex: 1; font-size: 17px; font-weight: 600; color: var(--tcl-cream); }
        .module__toggle {
          width: 24px;
          height: 24px;
          color: var(--tcl-gray);
          transition: transform 0.3s var(--ease-out);
        }
        .module.is-open .module__toggle { transform: rotate(180deg); }
        .module__body { max-height: 0; overflow: hidden; transition: max-height 0.4s var(--ease-out); }
        .module__content { padding: 0 28px 24px 92px; font-size: 15px; color: var(--tcl-gray-light); line-height: 1.7; }

        /* ── INSTRUCTOR ───────────────────────────────── */
        .instructor {
          display: grid;
          grid-template-columns: 280px 1fr;
          gap: 48px;
          align-items: center;
          max-width: 1000px;
          margin: 0 auto;
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 20px;
          padding: 48px;
        }
        .instructor__img {
          width: 100%;
          aspect-ratio: 1;
          border-radius: 16px;
          overflow: hidden;
          background: var(--tcl-dark-light);
        }
        .instructor__img img { width: 100%; height: 100%; object-fit: cover; }
        .instructor__eyebrow {
          font-size: 12px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.15em;
          color: var(--tcl-orange);
          margin-bottom: 12px;
        }
        .instructor__name {
          font-family: var(--font-display);
          font-size: 36px;
          letter-spacing: 0.02em;
          color: var(--tcl-cream);
          margin-bottom: 16px;
        }
        .instructor__bio { font-size: 15px; color: var(--tcl-gray-light); line-height: 1.7; }
        @media (max-width: 800px) {
          .instructor { grid-template-columns: 1fr; text-align: center; padding: 32px; }
          .instructor__img { max-width: 200px; margin: 0 auto; }
        }

        /* ── TESTIMONIALS ─────────────────────────────── */
        .testimonials-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 24px;
          max-width: 1200px;
          margin: 0 auto;
        }
        .testimonial {
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 16px;
          padding: 32px;
        }
        .testimonial__stars { color: var(--tcl-orange); font-size: 18px; margin-bottom: 16px; letter-spacing: 2px; }
        .testimonial__text { font-size: 15px; color: var(--tcl-gray-light); line-height: 1.7; margin-bottom: 20px; font-style: italic; }
        .testimonial__author { font-size: 14px; font-weight: 600; color: var(--tcl-cream); }
        .testimonial__location { font-size: 12px; color: var(--tcl-gray); text-transform: uppercase; letter-spacing: 0.08em; }
        @media (max-width: 900px) { .testimonials-grid { grid-template-columns: 1fr; } }

        /* ── PRICING ──────────────────────────────────── */
        .pricing {
          position: relative;
          padding: 120px 24px;
          background: var(--tcl-dark);
          overflow: hidden;
        }
        .pricing::before {
          content: '';
          position: absolute;
          top: 0;
          left: 50%;
          transform: translateX(-50%);
          width: 150%;
          height: 100%;
          background: radial-gradient(ellipse at center top, var(--tcl-orange-dim) 0%, transparent 50%);
          pointer-events: none;
        }
        .pricing__inner { position: relative; z-index: 2; }
        .pricing__guarantee {
          max-width: 800px;
          margin: 0 auto 60px;
          text-align: center;
          padding: 32px;
          background: var(--tcl-green-dim);
          border: 1px solid rgba(16,185,129,0.3);
          border-radius: 16px;
        }
        .pricing__guarantee-badge {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 6px 14px;
          background: var(--tcl-green);
          border-radius: 100px;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--tcl-white);
          margin-bottom: 16px;
        }
        .pricing__guarantee-title {
          font-family: var(--font-display);
          font-size: 28px;
          letter-spacing: 0.02em;
          color: var(--tcl-cream);
          margin-bottom: 12px;
        }
        .pricing__guarantee-text { font-size: 15px; color: var(--tcl-gray-light); line-height: 1.6; }
        .pricing-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 24px;
          max-width: 1100px;
          margin: 0 auto;
        }
        .price-card {
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 20px;
          padding: 40px 32px;
          text-align: center;
          transition: all 0.3s var(--ease-out);
          position: relative;
        }
        .price-card:hover { transform: translateY(-6px); border-color: var(--tcl-border-light); }
        .price-card--featured {
          border-color: var(--tcl-orange);
          background: linear-gradient(180deg, rgba(245,166,35,0.08) 0%, var(--tcl-dark-mid) 100%);
        }
        .price-card--featured:hover { border-color: var(--tcl-orange); }
        .price-card--virtual {
          border-color: var(--tcl-blue);
          background: linear-gradient(180deg, rgba(58,124,165,0.1) 0%, var(--tcl-dark-mid) 100%);
        }
        .price-card--virtual:hover { border-color: var(--tcl-blue); }
        .price-card__badge {
          position: absolute;
          top: -14px;
          left: 50%;
          transform: translateX(-50%);
          padding: 6px 20px;
          background: var(--tcl-orange);
          border-radius: 100px;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--tcl-black);
          white-space: nowrap;
        }
        .price-card__badge--virtual {
          background: var(--tcl-blue);
          color: var(--tcl-white);
        }
        .price-card__users {
          font-size: 14px;
          font-weight: 600;
          color: var(--tcl-gray-light);
          text-transform: uppercase;
          letter-spacing: 0.1em;
          margin-bottom: 8px;
        }
        .price-card__price {
          font-family: var(--font-display);
          font-size: 56px;
          letter-spacing: 0.02em;
          color: var(--tcl-cream);
          line-height: 1;
          margin-bottom: 8px;
        }
        .price-card__price sup { font-size: 28px; vertical-align: super; }
        .price-card__per { font-size: 13px; color: var(--tcl-gray); margin-bottom: 24px; }
        .price-card__features { text-align: left; margin-bottom: 28px; }
        .price-card__feature {
          display: flex;
          align-items: flex-start;
          gap: 12px;
          padding: 10px 0;
          font-size: 14px;
          color: var(--tcl-gray-light);
          border-bottom: 1px solid var(--tcl-border);
        }
        .price-card__feature:last-child { border-bottom: none; }
        .price-card__feature svg { width: 18px; height: 18px; color: var(--tcl-green); flex-shrink: 0; margin-top: 2px; }
        .price-card__cta {
          display: block;
          width: 100%;
          padding: 16px 24px;
          background: var(--tcl-orange);
          border: none;
          border-radius: 10px;
          font-family: var(--font-body);
          font-size: 15px;
          font-weight: 700;
          color: var(--tcl-black);
          text-decoration: none;
          transition: all 0.25s var(--ease-out);
        }
        .price-card__cta:hover {
          background: #ffb940;
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(245,166,35,0.3);
        }
        .price-card--outline .price-card__cta {
          background: transparent;
          border: 2px solid var(--tcl-orange);
          color: var(--tcl-orange);
        }
        .price-card--outline .price-card__cta:hover {
          background: var(--tcl-orange);
          color: var(--tcl-black);
        }
        .price-card--virtual .price-card__cta {
          background: var(--tcl-blue);
          color: var(--tcl-white);
        }
        .price-card--virtual .price-card__cta:hover {
          background: #4a8db6;
          box-shadow: 0 8px 24px rgba(58,124,165,0.35);
        }
        @media (max-width: 900px) {
          .pricing-grid { grid-template-columns: 1fr; max-width: 400px; }
          .price-card--featured { order: -1; }
        }

        /* ── FAQ ──────────────────────────────────────── */
        .faq-list { max-width: 800px; margin: 0 auto; }
        .faq-item { border-bottom: 1px solid var(--tcl-border); }
        .faq-item__question {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 20px;
          width: 100%;
          padding: 24px 0;
          background: none;
          border: none;
          font-family: var(--font-body);
          font-size: 17px;
          font-weight: 600;
          color: var(--tcl-cream);
          text-align: left;
          cursor: pointer;
          transition: color 0.2s ease;
        }
        .faq-item__question:hover { color: var(--tcl-orange); }
        .faq-item__question svg { width: 20px; height: 20px; color: var(--tcl-gray); flex-shrink: 0; transition: transform 0.3s var(--ease-out); }
        .faq-item.is-open .faq-item__question svg { transform: rotate(45deg); }
        .faq-item__answer { max-height: 0; overflow: hidden; transition: max-height 0.4s var(--ease-out); }
        .faq-item__answer-inner { padding-bottom: 24px; font-size: 15px; color: var(--tcl-gray-light); line-height: 1.7; }

        /* ── FINAL CTA ────────────────────────────────── */
        .final-cta {
          position: relative;
          padding: 120px 24px;
          text-align: center;
          overflow: hidden;
          background:
            linear-gradient(to bottom, rgba(10,12,16,0.92) 0%, rgba(10,12,16,0.88) 100%),
            url('https://trafficcoplabs.com/wp-content/uploads/2024/01/drones-public-safety.png') center/cover no-repeat fixed;
        }
        .final-cta::before {
          content: '';
          position: absolute;
          inset: 0;
          background: radial-gradient(ellipse at center, var(--tcl-orange-dim) 0%, transparent 60%);
          pointer-events: none;
        }
        .final-cta__content { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }
        .final-cta__title {
          font-family: var(--font-display);
          font-size: clamp(40px, 7vw, 64px);
          letter-spacing: 0.02em;
          line-height: 1;
          margin-bottom: 20px;
          color: var(--tcl-cream);
        }
        .final-cta__title span { color: var(--tcl-orange); }
        .final-cta__text { font-size: 18px; color: var(--tcl-gray-light); margin-bottom: 36px; line-height: 1.6; }
        .final-cta__btn {
          display: inline-flex;
          align-items: center;
          gap: 12px;
          padding: 18px 40px;
          background: var(--tcl-orange);
          border: none;
          border-radius: 12px;
          font-family: var(--font-body);
          font-size: 16px;
          font-weight: 700;
          color: var(--tcl-black);
          text-decoration: none;
          transition: all 0.25s var(--ease-out);
          cursor: pointer;
        }
        .final-cta__btn:hover {
          background: #ffb940;
          transform: translateY(-3px);
          box-shadow: 0 16px 40px rgba(245,166,35,0.35);
        }
        .final-cta__btn svg { width: 20px; height: 20px; }

        /* ── JUSTIFICATION KIT ────────────────────────── */
        .jkit {
          padding: 100px 24px;
          background: var(--tcl-black);
          position: relative;
          overflow: hidden;
        }
        .jkit::before {
          content: '';
          position: absolute;
          inset: 0;
          background: radial-gradient(ellipse at 30% 50%, rgba(245,166,35,0.04) 0%, transparent 60%);
          pointer-events: none;
        }
        .jkit__inner {
          max-width: 1100px;
          margin: 0 auto;
          position: relative;
          z-index: 2;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 64px;
          align-items: start;
        }
        .jkit__left { position: sticky; top: 40px; }
        .jkit__eyebrow {
          font-size: 12px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.15em;
          color: var(--tcl-orange);
          margin-bottom: 16px;
        }
        .jkit__title {
          font-family: var(--font-display);
          font-size: clamp(38px, 4.5vw, 54px);
          letter-spacing: 0.02em;
          line-height: 1;
          color: var(--tcl-cream);
          margin-bottom: 20px;
        }
        .jkit__title span { color: var(--tcl-orange); }
        .jkit__desc {
          font-size: 16px;
          color: var(--tcl-gray-light);
          line-height: 1.7;
          margin-bottom: 28px;
        }
        .jkit__points {
          display: flex;
          flex-direction: column;
          gap: 14px;
          margin-bottom: 32px;
        }
        .jkit__point { display: flex; align-items: flex-start; gap: 12px; }
        .jkit__point-icon {
          width: 32px;
          height: 32px;
          background: var(--tcl-orange-dim);
          border-radius: 8px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 16px;
          flex-shrink: 0;
          margin-top: 2px;
        }
        .jkit__point-text {
          font-size: 14px;
          color: var(--tcl-gray-light);
          line-height: 1.6;
        }
        .jkit__point-text strong {
          color: var(--tcl-cream);
          display: block;
          font-size: 13px;
          margin-bottom: 2px;
        }
        .jkit__badge {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 10px 18px;
          background: rgba(245,166,35,0.1);
          border: 1px solid rgba(245,166,35,0.2);
          border-radius: 100px;
          font-size: 12px;
          font-weight: 700;
          color: var(--tcl-orange);
        }

        /* Letter form card */
        .jkit__form-card {
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border-light);
          border-radius: 20px;
          overflow: hidden;
        }
        .jkit__form-header {
          padding: 24px 28px;
          border-bottom: 1px solid var(--tcl-border);
        }
        .jkit__form-title {
          font-family: var(--font-display);
          font-size: 22px;
          letter-spacing: 0.02em;
          color: var(--tcl-cream);
          margin-bottom: 4px;
        }
        .jkit__form-sub {
          font-size: 13px;
          color: var(--tcl-gray-light);
        }
        .jkit__form-body {
          padding: 28px;
          display: flex;
          flex-direction: column;
          gap: 16px;
        }
        .jkit__row {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
        }
        .jkit__field {
          display: flex;
          flex-direction: column;
          gap: 6px;
        }
        .jkit__field label {
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--tcl-gray-light);
        }
        .jkit__field input,
        .jkit__field select,
        .jkit__field textarea {
          padding: 10px 14px;
          background: var(--tcl-dark-light);
          border: 1.5px solid var(--tcl-border-light);
          border-radius: 8px;
          font-family: var(--font-body);
          font-size: 13.5px;
          color: var(--tcl-cream);
          transition: border-color 0.2s;
          outline: none;
          width: 100%;
        }
        .jkit__field input:focus,
        .jkit__field select:focus,
        .jkit__field textarea:focus { border-color: var(--tcl-orange); }
        .jkit__field input::placeholder,
        .jkit__field textarea::placeholder { color: var(--tcl-gray); }
        .jkit__field select option { background: #1e232d; color: var(--tcl-cream); }
        .jkit__field textarea { resize: vertical; min-height: 72px; }
        .jkit__context-note {
          font-size: 12px;
          color: var(--tcl-gray);
          margin-top: -8px;
          line-height: 1.5;
        }
        .jkit__generate-btn {
          width: 100%;
          padding: 15px;
          background: var(--tcl-orange);
          border: none;
          border-radius: 10px;
          font-family: var(--font-body);
          font-size: 15px;
          font-weight: 700;
          color: var(--tcl-black);
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          transition: all 0.25s var(--ease-out);
        }
        .jkit__generate-btn:hover:not(:disabled) {
          background: #ffb940;
          transform: translateY(-2px);
          box-shadow: 0 8px 24px rgba(245,166,35,0.35);
        }
        .jkit__generate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .jkit__generate-btn svg { width: 18px; height: 18px; }
        .spinner {
          width: 18px;
          height: 18px;
          border: 2px solid rgba(0,0,0,0.2);
          border-top-color: var(--tcl-black);
          border-radius: 50%;
          animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Output */
        .jkit__output-wrap { display: none; padding: 0 28px 28px; }
        .jkit__output-wrap.visible { display: block; }
        .jkit__output-divider {
          height: 1px;
          background: var(--tcl-border);
          margin-bottom: 20px;
        }
        .jkit__output-actions {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 14px;
          flex-wrap: wrap;
          gap: 10px;
        }
        .jkit__output-label {
          font-size: 11px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          color: var(--tcl-green);
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .jkit__output-label svg { width: 14px; height: 14px; }
        .jkit__action-btns { display: flex; gap: 8px; }
        .jkit__btn-sm {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          padding: 7px 14px;
          border-radius: 6px;
          font-size: 12px;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.2s;
          border: none;
          font-family: var(--font-body);
        }
        .jkit__btn-copy {
          background: var(--tcl-dark-light);
          color: var(--tcl-gray-light);
          border: 1px solid var(--tcl-border-light);
        }
        .jkit__btn-copy:hover {
          border-color: var(--tcl-orange);
          color: var(--tcl-orange);
        }
        .jkit__btn-word {
          background: var(--tcl-orange);
          color: var(--tcl-black);
        }
        .jkit__btn-word:hover { background: #ffb940; }
        .jkit__letter-output {
          background: rgba(255,255,255,0.03);
          border: 1px solid var(--tcl-border);
          border-radius: 10px;
          padding: 20px;
          font-size: 13px;
          line-height: 1.8;
          color: var(--tcl-gray-light);
          white-space: pre-wrap;
          max-height: 400px;
          overflow-y: auto;
          font-family: Georgia, serif;
        }
        .jkit__letter-output::-webkit-scrollbar { width: 4px; }
        .jkit__letter-output::-webkit-scrollbar-track { background: transparent; }
        .jkit__letter-output::-webkit-scrollbar-thumb {
          background: var(--tcl-border-light);
          border-radius: 4px;
        }
        @media (max-width: 900px) {
          .jkit__inner { grid-template-columns: 1fr; gap: 40px; }
          .jkit__left { position: static; }
          .jkit__row { grid-template-columns: 1fr; }
        }

        /* ── FIELD PROJECTS ───────────────────────────── */
        .field-projects {
          max-width: 900px;
          margin: 0 auto;
          display: flex;
          flex-direction: column;
          gap: 16px;
        }
        .field-project {
          display: flex;
          gap: 32px;
          align-items: flex-start;
          background: var(--tcl-dark-mid);
          border: 1px solid var(--tcl-border);
          border-radius: 16px;
          padding: 32px;
          transition: all 0.3s var(--ease-out);
        }
        .field-project:hover {
          border-color: rgba(245,166,35,0.2);
          transform: translateX(4px);
        }
        .field-project__number {
          font-family: var(--font-display);
          font-size: 48px;
          letter-spacing: 0.02em;
          color: var(--tcl-orange-dim);
          line-height: 1;
          flex-shrink: 0;
          width: 56px;
          text-align: center;
          border-right: 1px solid var(--tcl-border);
          padding-right: 28px;
          margin-right: 4px;
          color: rgba(245,166,35,0.3);
        }
        .field-project__body { flex: 1; }
        .field-project__tag {
          display: inline-block;
          padding: 4px 12px;
          background: var(--tcl-orange-dim);
          border-radius: 100px;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--tcl-orange);
          margin-bottom: 10px;
        }
        .field-project__title {
          font-family: var(--font-display);
          font-size: 22px;
          letter-spacing: 0.02em;
          color: var(--tcl-cream);
          margin-bottom: 10px;
        }
        .field-project__desc {
          font-size: 14px;
          color: var(--tcl-gray-light);
          line-height: 1.7;
        }
        @media (max-width: 640px) {
          .field-project { flex-direction: column; gap: 16px; }
          .field-project__number {
            border-right: none;
            border-bottom: 1px solid var(--tcl-border);
            padding-right: 0;
            padding-bottom: 12px;
            margin-right: 0;
            width: auto;
            text-align: left;
          }
        }


        /* ── SESSIONS ─────────────────────────────────── */
        .sessions {
          padding: 80px 24px;
          background: var(--tcl-black);
        }
        .sessions__inner {
          max-width: 1000px;
          margin: 0 auto;
        }
        .sessions__header {
          display: flex;
          align-items: flex-end;

      <!-- ── SYLLABUS ─────────────────────────────────── -->
      <section class="section section--darker" id="syllabus">
        <div class="container">
          <div class="section-header">
            <div class="section-eyebrow">Full Curriculum</div>
            <h2 class="section-title">Course <span>Syllabus</span></h2>
            <p class="section-desc">10 modules covering video authentication, photogrammetry, time-distance analysis, scene diagramming, and the complete ChronoSnap workflow.</p>
          </div>
          <div class="syllabus">

            <div class="module">
              <div class="module__header">
                <div class="module__number">01</div>
                <div class="module__title">Introduction to Video Evidence Investigation</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Get oriented. We'll cover how video evidence fits into an investigation, how courts treat it, what your obligations are as an investigator, and where most agencies are leaving capability on the table. You'll also get set up with ChronoSnap and walk through the case file that runs through the entire course.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">02</div>
                <div class="module__title">How Video Works — Camera Systems & Footage Fundamentals</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Before you analyze footage, you need to understand how cameras capture it. Frame rates, compression artifacts, lens distortion, sensor resolution, recording formats, and codec effects — all of it matters when you're making measurements. This module builds the foundation that keeps your analysis defensible.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">03</div>
                <div class="module__title">Video Authentication & Tampering Detection</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Not all video is what it claims to be. You'll learn to detect dropped frames, duplicate frames, encoding anomalies, and editing artifacts that indicate tampering — before the footage enters the legal process. We'll also cover chain of custody documentation and how to preserve video evidence correctly from first contact.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">04</div>
                <div class="module__title">Frame Rate Analysis & Time-Distance Calculations</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">This is where you start turning footage into numbers. You'll use frame counts and known distances to calculate speeds, determine time gaps, and build the time-distance framework for your reconstruction. We walk through the math step by step — and then you apply it to real case footage. Every calculation is designed to be explained in plain English on the stand.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">05</div>
                <div class="module__title">Inverse Camera Photogrammetry — Fixed Cameras</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">The core skill of FRAME. Inverse camera photogrammetry lets you use a fixed camera — a traffic cam, parking lot camera, or storefront system — to measure real-world distances, determine spatial positions, and calculate velocities without ever touching a tape measure at the scene. You'll work through the technique from first principles to final measurement using ChronoSnap.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">06</div>
                <div class="module__title">Speed Surveys & Computer Vision Methods</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Establish accurate baseline data for time-distance analysis using computer vision models — vehicle tracking, pedestrian walking speed measurement, and motion capture from footage. You'll learn how to conduct and document speed surveys that are reproducible and that hold up when challenged. This module also covers how to handle degraded footage and low-resolution sources.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">07</div>
                <div class="module__title">Brake Lamp Evaluation & Pre-Impact Behavior Analysis</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Did they brake? Did they swerve? Were they even paying attention? Video often captures pre-impact driver behavior that physical evidence can't. This module teaches you to analyze brake lamp activation timing, steering inputs, and reaction behavior from footage — and integrate those findings into your crash reconstruction or criminal case.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">08</div>
                <div class="module__title">Suspect Vehicle Identification from Video</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Given a partial view of an unknown vehicle — a bumper, a roofline, a side profile from a parking lot — can you identify the make and model? With photogrammetric measurement, often yes. You'll learn to extract dimensional data from video, compare it against vehicle databases, and document findings in a way that supports investigative leads and holds up in court.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number">09</div>
                <div class="module__title">Scene Diagramming from Video Evidence</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Take your measurements and build a diagram. You'll produce professional, court-ready scene diagrams derived entirely from video analysis — no physical scene access required. We cover pedestrian strike diagrams, vehicle path reconstructions, and shooter movement maps. Every diagram is annotated with measurements, uncertainty ranges, and methodology notes that survive expert scrutiny.</div>
              </div>
            </div>

            <div class="module">
              <div class="module__header">
                <div class="module__number module__number--bonus">+</div>
                <div class="module__title">Case Study Projects & Scenario Challenges</div>
                <svg class="module__toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
              </div>
              <div class="module__body">
                <div class="module__content">Real footage. Real problems. No answer key handed to you. You'll work through multi-camera investigations, reconstruct incidents from scratch using only video evidence, and complete the culminating FRAME Challenge — a full case reconstruction that integrates every skill in the course. This is where training becomes capability.</div>
              </div>
            </div>

          </div>
        </div>
      </section>

              <div class="faq-item__answer">
                <div class="faq-item__answer-inner">We don't book lodging, but we provide a recommended hotels list near the training site with every registration confirmation. Many agencies use this course to fulfill training budget requirements and cover travel and per diem — we can provide the documentation your finance or admin team needs to process reimbursement.</div>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>

              <div class="faq-item__answer">

            <div class="faq-item">

              </button>
              <div class="faq-item__answer">
                <div class="faq-item__answer-inner">If an officer your agency enrolled in the course separates from the department within two years of their attendance date — for any reason — we'll enroll a replacement at no charge, up to one time per original seat. Your training investment stays with the agency, not the individual who walks out the door.</div>

              </button>
              <div class="faq-item__answer">
                <div class="faq-item__answer-inner">Cancellations made 30 or more days before the course start date receive a full refund minus a 3% processing fee. Cancellations within 30 days can transfer their seat to a colleague at no charge, or apply the registration credit toward a future FRAME session. Contact us and we'll work something out — we understand that law enforcement schedules change.</div>

    // ── API CONSTANTS ─────────────────────────────────────────────
    const PROXY_URL    = 'https://training.trafficcoplabs.com/api/generate-letter/';
    const CRM_URL      = 'https://crm.trafficcoplabs.com/api/letter-lead/';
    const PRODUCTS_URL = 'https://crm.trafficcoplabs.com/api/products/';
    const EVENTS_URL   = 'https://crm.trafficcoplabs.com/api/events/';

    let generatedLetter = '';
    let productsData = { courses: [], software: [] };

    // Load products and find FRAME course
    async function loadProducts() {
      console.log('FRAME: Loading products...');
      try {
        const res = await fetch(PRODUCTS_URL);
        productsData = await res.json();
        console.log('FRAME: Products loaded:', productsData);
        
        // Find FRAME course
        const frameCourse = (productsData.courses || []).find(c =>
          c.name.toLowerCase().includes('frame') || 
          c.name.toLowerCase().includes('video evidence')
        );
        
        console.log('FRAME: Found FRAME course:', frameCourse);
        
        if (frameCourse) {
          // Load events for this course
          await loadEventsForCourse(frameCourse.id);
        } else {
          console.warn('FRAME: FRAME course not found in products');
        }
      } catch (error) {
        console.error('FRAME: Failed to load products:', error);
      }
    }

    async function loadEventsForCourse(courseId) {
      console.log('FRAME: Loading events for course ID:', courseId);
      try {
        const res = await fetch(`${EVENTS_URL}?product_id=${courseId}`);
        const data = await res.json();
        console.log('FRAME: Events API response:', data);
        
        // Wait for Shadow DOM to be ready
        await new Promise(resolve => {
          const checkShadow = () => {
            const eventSelect = shadow.getElementById('jk_event');
            if (eventSelect) {
              resolve();
            } else {
              setTimeout(checkShadow, 100);
            }
          };
          checkShadow();
        });
        
        // Update the dropdown with real events
        const eventSelect = shadow.getElementById('jk_event');
        eventSelect.innerHTML = '';
        
        if (data.events && data.events.length > 0) {
          console.log('FRAME: Found', data.events.length, 'events, populating dropdown');
          data.events.forEach(e => {
            let label = e.name;
            if (e.date) label += ` — ${e.date}`;
            if (e.location && e.delivery !== 'online') label += ` (${e.location})`;
            if (e.status === 'full') label += ' [FULL]';
            eventSelect.innerHTML += `<option value="${e.id}">${label}</option>`;
            console.log('FRAME: Added event:', label, 'with ID:', e.id);
          });
        } else {
          console.log('FRAME: No events found, using hardcoded fallback');
          // Fallback to hardcoded option if no events from API
          eventSelect.innerHTML = '<option value="frame-mountpleasant-jun2026">Mount Pleasant, SC — June 22–26, 2026</option>';
        }
        
        console.log('FRAME events loaded:', data.events?.length || 0, 'events');
        
      } catch (error) {
        console.error('FRAME: Failed to load events:', error);
        // Keep the existing hardcoded option as fallback
        const eventSelect = shadow.getElementById('jk_event');
        if (eventSelect && eventSelect.innerHTML.trim() === '') {
          console.log('FRAME: Setting fallback option due to error');
          eventSelect.innerHTML = '<option value="frame-mountpleasant-jun2026">Mount Pleasant, SC — June 22–26, 2026</option>';
        }
      }
    }

    // Start loading products after shadow DOM is set up
    setTimeout(() => {
      loadProducts();
    }, 100);

    // ── LETTER GENERATION ─────────────────────────────────────────
    async function generateJustificationLetter() {
      const name       = shadow.getElementById('jk_name').value.trim();
      const email      = shadow.getElementById('jk_email').value.trim();
      const department = shadow.getElementById('jk_department').value.trim();
      const supervisor = shadow.getElementById('jk_supervisor').value.trim();

      if (!name || !email || !department || !supervisor) {
        alert('Please fill in your name, email, department, and supervisor name.');
        return;
      }

      const btn = shadow.getElementById('jk_btn');
      btn.disabled = true;
      shadow.getElementById('jk_btn_label').style.display = 'none';
      shadow.getElementById('jk_btn_loading').style.display = 'flex';

      // Get the actual product ID and event ID (like test page)
      let productId = '', eventId = 'online', productName = '';

      // Find FRAME course
      const frameCourse = (productsData.courses || []).find(c =>
        c.name.toLowerCase().includes('frame') || 
        c.name.toLowerCase().includes('video evidence')
      );

      if (frameCourse) {
        productId = frameCourse.id;
        productName = frameCourse.name;
      }

      // Get selected event ID
      const eventSelect = shadow.getElementById('jk_event');
      if (eventSelect && eventSelect.value) {
        eventId = eventSelect.value;
      }

      const payload = {
        name, email, department,
        rank: shadow.getElementById('jk_rank').value.trim(),
        supervisor_name: supervisor,
        supervisor_title: shadow.getElementById('jk_sup_title').value.trim(),
        letter_type: 'training',
        product_id: productId,
        event_id: eventId,
        hardware_description: '',
        additional_context: shadow.getElementById('jk_context').value.trim(),
      };

      try {
        const res  = await fetch(PROXY_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.letter) {
          generatedLetter = data.letter;
          shadow.getElementById('jk_letter_output').textContent = data.letter;
          shadow.getElementById('jk_output_wrap').classList.add('visible');
          shadow.getElementById('jk_output_wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          
          // CRM lead capture — include the generated letter (like test page)
          // Split name into first and last name for CRM
          const nameParts = name.split(' ');
          const firstName = nameParts[0] || '';
          const lastName = nameParts.slice(1).join(' ') || '';
          
          // Get product slug from course data
          const productSlug = frameCourse ? (frameCourse.slug || frameCourse.name.toLowerCase().replace(/\s+/g, '-')) : 'frame';
          
          const crmPayload = { 
            ...payload, 
            first_name: firstName,
            last_name: lastName,
            product_slug: productSlug,
            product_name: productName, 
            generated_letter: data.letter 
          };
          console.log('FRAME: Complete payload being sent to CRM:');
          console.log('- first_name:', crmPayload.first_name);
          console.log('- last_name:', crmPayload.last_name);
          console.log('- email:', crmPayload.email);
          console.log('- department:', crmPayload.department);
          console.log('- rank:', crmPayload.rank);
          console.log('- supervisor_name:', crmPayload.supervisor_name);
          console.log('- supervisor_title:', crmPayload.supervisor_title);
          console.log('- additional_context:', crmPayload.additional_context);
          console.log('- generated_letter length:', crmPayload.generated_letter?.length);
          console.log('- product_slug:', crmPayload.product_slug);
          console.log('- product_name:', crmPayload.product_name);
          console.log('- Full payload:', crmPayload);
          
          fetch(CRM_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(crmPayload)
          }).then(response => {
            if (!response.ok) {
              console.error('FRAME: CRM lead capture failed:', response.status, response.statusText);
              // Try to get error details
              response.text().then(errorText => {
                console.error('FRAME: CRM error details:', errorText);
              });
            } else {
              console.log('FRAME: CRM lead captured successfully');
            }
          }).catch(error => {
            console.error('FRAME: CRM lead capture error:', error);
          });
        } else {
          alert('Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        alert('Failed to reach the server. Please try again.');
      } finally {
        btn.disabled = false;
        shadow.getElementById('jk_btn_label').style.display = 'flex';
        shadow.getElementById('jk_btn_loading').style.display = 'none';
      }
    }

    function copyJustificationLetter() {
      navigator.clipboard.writeText(generatedLetter).then(() => {
        const btn = shadow.getElementById('jk_copy_btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      });
    }

    async function downloadJustificationDocx() {
      if (!generatedLetter) {
        alert('Please generate a letter first.');
        return;
      }

      const btn = shadow.getElementById('jk_download_btn');
      const origHTML = btn.innerHTML;
      
      try {
        // Show loading state
        btn.disabled = true;
        btn.innerHTML = '<div style="width:13px;height:13px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;"></div> Creating...';
        
        // Use server-side Word generation (like your test file)
        const response = await fetch('https://training.trafficcoplabs.com/api/letter-to-docx/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ letter: generatedLetter })
        });

        if (response.ok) {
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'frame-justification-letter.docx';
          link.click();
          URL.revokeObjectURL(url);
          
          // Show success
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><polyline points="20 6 9 17 4 12"></polyline></svg> Downloaded!';
          setTimeout(() => {
            btn.innerHTML = origHTML;
            btn.disabled = false;
          }, 2000);
        } else {
          throw new Error('Server failed to generate Word document');
        }

      } catch (error) {
        console.error('Word download error:', error);
        
        btn.innerHTML = origHTML;
        btn.disabled = false;
        
        // Fallback to copy
        if (confirm('Word download failed. Would you like to copy the letter text instead?')) {
          copyJustificationLetter();
        }
      }
    }

    shadow.getElementById('jk_btn').addEventListener('click', generateJustificationLetter);
    shadow.getElementById('jk_copy_btn').addEventListener('click', copyJustificationLetter);
    shadow.getElementById('jk_download_btn').addEventListener('click', downloadJustificationDocx);

    // ANCHOR NAVIGATION — hash links inside Shadow DOM
    shadow.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('href').substring(1);
        const target = shadow.getElementById(targetId);
        if (target) {
          const rect = target.getBoundingClientRect();
          window.scrollTo({ top: window.scrollY + rect.top, behavior: 'smooth' });
        }
      });
    });

    // MODULE ACCORDION
    const modules = shadow.querySelectorAll('.module');
    modules.forEach(mod => {
      const header = mod.querySelector('.module__header');
      const body = mod.querySelector('.module__body');
      header.addEventListener('click', () => {
        const isOpen = mod.classList.contains('is-open');
        modules.forEach(m => {
          m.classList.remove('is-open');
          m.querySelector('.module__body').style.maxHeight = '0';
        });
        if (!isOpen) {
          mod.classList.add('is-open');
          body.style.maxHeight = body.scrollHeight + 'px';
        }
      });
    });

    // FAQ ACCORDION
    const faqs = shadow.querySelectorAll('.faq-item');
    faqs.forEach(faq => {
      const question = faq.querySelector('.faq-item__question');
      const answer = faq.querySelector('.faq-item__answer');
      question.addEventListener('click', () => {
        const isOpen = faq.classList.contains('is-open');
        faqs.forEach(f => {
          f.classList.remove('is-open');
          f.querySelector('.faq-item__answer').style.maxHeight = '0';
        });
        if (!isOpen) {
          faq.classList.add('is-open');
          answer.style.maxHeight = answer.scrollHeight + 'px';
        }
      });
    });
  }
}
